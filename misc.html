<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misc — Pedro Ribeiro de Almeida</title>
    <script>document.documentElement.setAttribute('lang', localStorage.getItem('preferred-lang') || 'en');</script>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ---- Dropdown (misc-specific nav addition) ---- */
        .nav-links li {
            position: relative;
        }

        .dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 1px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg);
            border: 1px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            min-width: 130px;
            overflow: hidden;
        }

        .nav-links li:hover .dropdown {
            display: block;
        }

        .dropdown a {
            display: block;
            padding: 10px 16px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-muted) !important;
            border-bottom: none !important;
            white-space: nowrap;
            transition: background 0.15s, color 0.15s;
        }

        .dropdown a:hover,
        .dropdown a.current {
            background: var(--accent-soft);
            color: var(--accent) !important;
            border-bottom: none !important;
        }

        /* ---- Subpage list ---- */
        .subpage-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .subpage-list li a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            color: var(--text);
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .subpage-list li a:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            transform: translateY(-1px);
        }

        .subpage-icon {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: white;
            background: var(--accent);
            border-radius: 6px;
            padding: 5px 10px;
            flex-shrink: 0;
        }

        .subpage-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .subpage-title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text);
        }

        .subpage-desc {
            font-size: 0.83rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-inner">
            <a href="./index.html" class="nav-brand">Pedro Ribeiro de Almeida</a>
            <ul class="nav-links">
                <li><a href="./index.html">
                    <span class="en">about</span><span class="pt">sobre</span>
                </a></li>
                <li><a href="./research.html">
                    <span class="en">research</span><span class="pt">pesquisa</span>
                </a></li>
                <li><a href="./contact.html">
                    <span class="en">contact</span><span class="pt">contato</span>
                </a></li>
                <li>
                    <a href="./misc.html" class="current">misc</a>
                    <div class="dropdown">
                        <a href="./misc/shortcuts.html">shortcuts</a>
                    </div>
                </li>
            </ul>
            <div class="nav-right">
                <button class="lang-toggle" id="langToggle">PT</button>
            </div>
        </div>
    </nav>

    <main>
        <h1 class="section-label" style="margin-bottom: 32px;">Misc</h1>

        <ul class="subpage-list">
            <li>
                <a href="./misc/shortcuts.html">
                    <span class="subpage-icon">⌨</span>
                    <div class="subpage-info">
                        <span class="subpage-title">Shortcuts</span>
                        <span class="subpage-desc">Keyboard shortcuts for tmux and other tools I use regularly.</span>
                    </div>
                </a>
            </li>
        </ul>
    </main>

    <footer>
        <p>&#x2665; 2025 &nbsp;&middot;&nbsp; Pedro Ribeiro de Almeida</p>
    </footer>

    <script src="./lang.js"></script>
</body>

</html>
